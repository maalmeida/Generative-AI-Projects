<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wave Lab: Precision Oscilloscope</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; margin: 0; background: #0a0a0a; color: white; overflow: hidden; display: flex; height: 100vh; }
        
        #sidebar {
            width: 320px; background: #1a1a1a; border-right: 1px solid #333;
            display: flex; flex-direction: column; padding: 20px; box-sizing: border-box;
            z-index: 10; overflow-y: auto;
        }
        
        .source-group { margin-bottom: 15px; padding: 12px; border-radius: 8px; border: 1px solid #333; background: #222; }
        .s1-accent { border-left: 5px solid #00ffff; }
        .s2-accent { border-left: 5px solid #ff00ff; }
        
        h3 { margin: 0 0 10px 0; font-size: 0.9em; text-transform: uppercase; color: #eee; }
        .control-row { margin-bottom: 8px; }
        label { display: flex; justify-content: space-between; font-size: 0.75em; color: #999; margin-bottom: 2px; }
        input[type=range] { width: 100%; accent-color: #4CAF50; cursor: pointer; }
        
        #main-container { flex-grow: 1; position: relative; display: flex; flex-direction: column; }
        canvas#waveCanvas { width: 100%; height: 100%; cursor: crosshair; }

        button { 
            padding: 12px; cursor: pointer; background: #2e7d32; color: white; 
            border: none; border-radius: 4px; font-weight: bold; margin-bottom: 15px;
        }

        #graph-container {
            position: absolute; bottom: 20px; right: 20px; width: 300px; height: 160px;
            background: rgba(0, 0, 0, 0.9); border: 2px solid #444; border-radius: 8px;
            padding: 10px; box-shadow: 0 0 20px rgba(0,0,0,0.8);
        }
        .graph-label { position: absolute; top: 8px; left: 12px; font-size: 10px; color: #ffff00; font-weight: bold; letter-spacing: 1px; }
        canvas#graphCanvas { width: 100%; height: 100%; }
    </style>
</head>
<body>

<div id="sidebar">
    <button id="toggleMode">Showing: Superposition</button>

    <div class="source-group s1-accent">
        <h3>Source 1 (Cyan)</h3>
        <div class="control-row"><label>Amp <span id="v-amp0">1.0</span></label><input type="range" id="amp0" min="0" max="1.5" step="0.1" value="1"></div>
        <div class="control-row"><label>λ <span id="v-wave0">45</span></label><input type="range" id="wave0" min="20" max="150" step="1" value="45"></div>
        <div class="control-row"><label>Freq <span id="v-freq0">0.08</span></label><input type="range" id="freq0" min="0.01" max="0.2" step="0.01" value="0.08"></div>
        <div class="control-row"><label>Phase <span id="v-phase0">0°</span></label><input type="range" id="phase0" min="0" max="360" step="1" value="0"></div>
    </div>

    <div class="source-group s2-accent">
        <h3>Source 2 (Magenta)</h3>
        <div class="control-row"><label>Amp <span id="v-amp1">1.0</span></label><input type="range" id="amp1" min="0" max="1.5" step="0.1" value="1"></div>
        <div class="control-row"><label>λ <span id="v-wave1">45</span></label><input type="range" id="wave1" min="20" max="150" step="1" value="45"></div>
        <div class="control-row"><label>Freq <span id="v-freq1">0.08</span></label><input type="range" id="freq1" min="0.01" max="0.2" step="0.01" value="0.08"></div>
        <div class="control-row"><label>Phase <span id="v-phase1">0°</span></label><input type="range" id="phase1" min="0" max="360" step="1" value="0"></div>
    </div>
</div>

<div id="main-container">
    <canvas id="waveCanvas"></canvas>
    <div id="graph-container">
        <div class="graph-label">POINT P: REAL-TIME OSCILLATION</div>
        <canvas id="graphCanvas"></canvas>
    </div>
</div>

<script>
    const canvas = document.getElementById('waveCanvas');
    const ctx = canvas.getContext('2d');
    const gCanvas = document.getElementById('graphCanvas');
    const gCtx = gCanvas.getContext('2d');
    const toggleBtn = document.getElementById('toggleMode');

    let width, height, time = 0;
    let displayMode = 0; 
    let history = [];

    const sources = [
        { x: 0, y: 0, r: 12, color: '#00ffff', amp: 1, lambda: 45, f: 0.08, phase: 0 },
        { x: 0, y: 0, r: 12, color: '#ff00ff', amp: 1, lambda: 45, f: 0.08, phase: 0 }
    ];
    let pointP = { x: 0, y: 0, r: 8, color: '#ffff00' };
    let dragging = null;

    function resize() {
        width = canvas.width = window.innerWidth - 320;
        height = canvas.height = window.innerHeight;
        gCanvas.width = 300; gCanvas.height = 140;
        sources[0].x = width * 0.35; sources[0].y = height * 0.5;
        sources[1].x = width * 0.65; sources[1].y = height * 0.5;
        pointP.x = width * 0.5; pointP.y = height * 0.3;
    }

    function getDisplacement(x, y, src, t) {
        const d = Math.hypot(x - src.x, y - src.y);
        const phaseRad = (src.phase * Math.PI) / 180;
        return src.amp * Math.sin((2 * Math.PI * d / src.lambda) - (t * src.f * 10) + phaseRad);
    }

    function update() {
        // Sync parameters
        [0, 1].forEach(i => {
            sources[i].amp = parseFloat(document.getElementById(`amp${i}`).value);
            sources[i].lambda = parseFloat(document.getElementById(`wave${i}`).value);
            sources[i].f = parseFloat(document.getElementById(`freq${i}`).value);
            sources[i].phase = parseFloat(document.getElementById(`phase${i}`).value);
            document.getElementById(`v-amp${i}`).innerText = sources[i].amp;
            document.getElementById(`v-wave${i}`).innerText = sources[i].lambda;
            document.getElementById(`v-freq${i}`).innerText = sources[i].f;
            document.getElementById(`v-phase${i}`).innerText = sources[i].phase + "°";
        });

        time += 1;
        const imgData = ctx.createImageData(width, height);
        const data = imgData.data;

        // Wave Field Rendering
        for (let y = 0; y < height; y += 2) {
            for (let x = 0; x < width; x += 2) {
                let v1 = getDisplacement(x, y, sources[0], time);
                let v2 = getDisplacement(x, y, sources[1], time);
                let val = (displayMode === 0) ? (v1 + v2) / 2 : (displayMode === 1 ? v1 : v2);
                let color = (val + 1.5) * 80;
                for (let ox = 0; ox < 2; ox++) {
                    for (let oy = 0; oy < 2; oy++) {
                        let idx = ((y + oy) * width + (x + ox)) * 4;
                        data[idx] = color * 0.1; data[idx+1] = color * 0.4; data[idx+2] = color; data[idx+3] = 255;
                    }
                }
            }
        }
        ctx.putImageData(imgData, 0, 0);

        // Draw Interactive Elements
        [...sources, pointP].forEach(obj => {
            ctx.beginPath(); ctx.arc(obj.x, obj.y, obj.r, 0, 7);
            ctx.fillStyle = obj.color; ctx.fill();
            ctx.strokeStyle = "white"; ctx.stroke();
        });

        // Calculate History Length: Max Period
        // Sine arg is (t * f * 10). One period (2π) happens when t = 2π / (f * 10)
        const minFreq = Math.min(sources[0].f, sources[1].f);
        const maxBufferLength = Math.ceil((2 * Math.PI) / (minFreq * 10)) * 10; // Extra padding for clarity

        let pV1 = getDisplacement(pointP.x, pointP.y, sources[0], time);
        let pV2 = getDisplacement(pointP.x, pointP.y, sources[1], time);
        let currentP = (displayMode === 0) ? (pV1 + pV2) / 2 : (displayMode === 1 ? pV1 : pV2);
        
        history.push(currentP);
        while (history.length > maxBufferLength) history.shift();

        renderGraph(currentP);
        requestAnimationFrame(update);
    }

    function renderGraph(currentVal) {
        gCtx.clearRect(0, 0, gCanvas.width, gCanvas.height);
        
        const centerY = gCanvas.height / 2;

        // Draw Reference Grid
        gCtx.strokeStyle = "#222";
        gCtx.beginPath(); gCtx.moveTo(0, centerY); gCtx.lineTo(gCanvas.width, centerY); gCtx.stroke();

        // Draw Wave History
        gCtx.strokeStyle = "rgba(255, 255, 0, 0.4)";
        gCtx.lineWidth = 2;
        gCtx.beginPath();
        for(let i = 0; i < history.length; i++) {
            let x = (i / (history.length - 1)) * (gCanvas.width - 20); // Save space for the point
            let y = centerY - (history[i] * 40);
            if(i === 0) gCtx.moveTo(x, y); else gCtx.lineTo(x, y);
        }
        gCtx.stroke();

        // Emphasize the CURRENT point
        const currentX = gCanvas.width - 20;
        const currentY = centerY - (currentVal * 40);

        // Vertical line marker
        gCtx.setLineDash([5, 5]);
        gCtx.strokeStyle = "#444";
        gCtx.beginPath(); gCtx.moveTo(currentX, 10); gCtx.lineTo(currentX, gCanvas.height-10); gCtx.stroke();
        gCtx.setLineDash([]);

        // Glowing indicator point
        gCtx.shadowBlur = 15;
        gCtx.shadowColor = "#ffff00";
        gCtx.fillStyle = "#ffff00";
        gCtx.beginPath();
        gCtx.arc(currentX, currentY, 5, 0, Math.PI * 2);
        gCtx.fill();
        gCtx.shadowBlur = 0; // Reset shadow for next frame
    }

    function getMouse(e) {
        const rect = canvas.getBoundingClientRect();
        return { x: e.clientX - rect.left, y: e.clientY - rect.top };
    }

    canvas.onmousedown = (e) => {
        const m = getMouse(e);
        [pointP, ...sources].forEach(obj => {
            if (Math.hypot(m.x - obj.x, m.y - obj.y) < 30) dragging = obj;
        });
    };

    window.onmousemove = (e) => {
        if (dragging) {
            const m = getMouse(e);
            dragging.x = Math.max(0, Math.min(width, m.x));
            dragging.y = Math.max(0, Math.min(height, m.y));
            history = []; 
        }
    };

    window.onmouseup = () => dragging = null;
    toggleBtn.onclick = () => {
        displayMode = (displayMode + 1) % 3;
        const ms = ["Superposition", "Source 1", "Source 2"];
        toggleBtn.innerText = `Showing: ${ms[displayMode]}`;
        history = [];
    };

    window.onresize = resize;
    resize();
    update();
</script>
</body>
</html>

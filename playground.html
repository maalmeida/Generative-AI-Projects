<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KaTeX Live Preview</title>
    
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
    
    <script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>

    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
            background-color: #f4f7f6;
        }
        .container {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        textarea {
            width: 100%;
            height: 150px;
            padding: 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-family: "Fira Code", monospace;
            font-size: 16px;
            box-sizing: border-box;
        }
        #output {
            min-height: 100px;
            padding: 20px;
            background: white;
            border-radius: 8px;
            border: 1px solid #ddd;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            overflow-x: auto;
        }
        h2 { color: #333; }
        .hint { font-size: 0.9rem; color: #666; }
    </style>
</head>
<body>

    <div class="container">
        <h2>KaTeX Real-Time Preview</h2>
        <p class="hint">Type your LaTeX here (e.g., <code>\int_{a}^{b} f(x) dx</code>):</p>
        
        <textarea id="input" placeholder="Type math here..."></textarea>
        
        <div id="output">Your rendered math will appear here.</div>
    </div>

    <script>
        const input = document.getElementById('input');
        const output = document.getElementById('output');

        input.addEventListener('input', () => {
            const rawText = input.value;
            
            try {
                katex.render(rawText, output, {
                    throwOnError: false,
                    displayMode: true
                });
            } catch (err) {
                output.innerHTML = "<span style='color:red'>" + err + "</span>";
            }
        });
    </script>

</body>
</html>
